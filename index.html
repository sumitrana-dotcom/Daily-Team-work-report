<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily & Weekly Report Cards — June 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef0f7;color:#222;min-height:100vh;}

/* HEADER */
header{background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;}
header h1{font-size:1.35rem;font-weight:700;}
.header-meta{font-size:.82rem;opacity:.75;margin-top:3px;}
.live-clock{font-size:1.1rem;font-weight:700;letter-spacing:1px;text-align:right;}
.live-date{font-size:.75rem;opacity:.75;margin-top:2px;text-align:right;}

/* TOGGLE */
.container{max-width:1380px;margin:0 auto;padding:24px 20px;}
.toggle-row{display:flex;gap:8px;margin-bottom:24px;align-items:center;flex-wrap:wrap;}
.toggle-btn{padding:9px 26px;border-radius:99px;border:2px solid #c5cae9;background:#fff;color:#3949ab;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;}
.toggle-btn.active,.toggle-btn:hover{background:#3949ab;color:#fff;border-color:#3949ab;}
.toggle-label{font-size:.8rem;color:#888;margin-left:8px;}

/* VIEW */
.view{display:none;} .view.active{display:block;}

/* SUMMARY STRIP */
.strip{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
.strip-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 2px 6px rgba(0,0,0,.07);border-left:4px solid #3949ab;}
.strip-card.o{border-left-color:#e65100;} .strip-card.g{border-left-color:#00796b;} .strip-card.p{border-left-color:#6a1b9a;} .strip-card.r{border-left-color:#c62828;}
.strip-lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.8px;color:#999;margin-bottom:4px;}
.strip-val{font-size:1.55rem;font-weight:800;color:#1a237e;}
.strip-card.o .strip-val{color:#e65100;} .strip-card.g .strip-val{color:#00796b;} .strip-card.p .strip-val{color:#6a1b9a;} .strip-card.r .strip-val{color:#c62828;}
.strip-sub{font-size:.7rem;color:#bbb;margin-top:2px;}

/* DAY REPORT CARD */
.day-cards{display:flex;flex-direction:column;gap:22px;}
.day-card{background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(0,0,0,.09);overflow:hidden;}
.day-header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.day-header:hover{filter:brightness(.97);}
.day-date-block{display:flex;align-items:center;gap:14px;}
.day-date-num{width:54px;height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:800;}
.day-date-num .dn{font-size:1.4rem;line-height:1;}
.day-date-num .dm{font-size:.65rem;opacity:.85;margin-top:2px;}
.day-title{font-size:1rem;font-weight:700;color:#1a237e;}
.day-subtitle{font-size:.75rem;color:#888;margin-top:2px;}
.day-kpis{display:flex;gap:18px;align-items:center;}
.dkpi{text-align:center;}
.dkpi-val{font-size:1.1rem;font-weight:800;}
.dkpi-lbl{font-size:.62rem;color:#aaa;text-transform:uppercase;letter-spacing:.5px;}
.day-chevron{font-size:1.1rem;color:#bbb;transition:transform .2s;}
.day-card.open .day-chevron{transform:rotate(180deg);}

.day-body{display:none;padding:0 24px 20px;}
.day-card.open .day-body{display:block;}

.day-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:4px;}
.day-chart-wrap{background:#f7f8fc;border-radius:10px;padding:14px 16px;}
.day-chart-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-bottom:10px;}
canvas.day-chart{max-height:180px;}

/* Member mini rows */
.member-rows{display:flex;flex-direction:column;gap:7px;}
.member-row{display:flex;align-items:center;gap:10px;background:#f7f8fc;border-radius:9px;padding:9px 12px;}
.member-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.member-name{font-size:.82rem;font-weight:700;min-width:110px;}
.member-bar-wrap{flex:1;}
.member-bar-bg{background:#e8eaf6;border-radius:3px;height:6px;}
.member-bar-fill{border-radius:3px;height:6px;}
.member-stats{display:flex;gap:14px;font-size:.72rem;color:#666;min-width:180px;justify-content:flex-end;}
.member-stats span{display:flex;flex-direction:column;align-items:flex-end;}
.member-stats b{font-size:.8rem;font-weight:700;color:#222;}

/* WEEKLY CARDS */
.week-cards{display:flex;flex-direction:column;gap:28px;}
.week-card{background:#fff;border-radius:16px;box-shadow:0 3px 14px rgba(0,0,0,.09);overflow:hidden;}
.week-header{padding:18px 26px;display:flex;align-items:center;justify-content:space-between;}
.week-title{font-size:1.1rem;font-weight:800;color:#fff;}
.week-range{font-size:.75rem;opacity:.8;margin-top:2px;}
.week-kpis-strip{display:flex;gap:24px;}
.wkpi{text-align:center;color:#fff;}
.wkpi-val{font-size:1.25rem;font-weight:800;}
.wkpi-lbl{font-size:.6rem;opacity:.75;text-transform:uppercase;}
.week-body{padding:20px 26px;}
.week-body-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:18px;}
canvas.week-chart{max-height:220px;}
.week-member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.wm-card{border-radius:10px;padding:12px 14px;}
.wm-name{font-size:.82rem;font-weight:700;margin-bottom:6px;}
.wm-stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.wm-stat{font-size:.68rem;color:#555;}
.wm-stat b{font-size:.82rem;font-weight:700;color:#222;display:block;}

/* Timeline */
.timeline{position:relative;padding-left:28px;margin-top:14px;}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#e8eaf6;}
.tl-item{position:relative;margin-bottom:12px;}
.tl-dot{position:absolute;left:-23px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;}
.tl-time{font-size:.68rem;color:#aaa;font-weight:600;}
.tl-text{font-size:.78rem;color:#444;margin-top:1px;}

@media(max-width:900px){
  .strip{grid-template-columns:repeat(2,1fr);}
  .day-body-grid{grid-template-columns:1fr;}
  .week-body-grid{grid-template-columns:1fr;}
  .week-member-grid{grid-template-columns:repeat(2,1fr);}
  .day-kpis{flex-wrap:wrap;gap:10px;}
  .week-kpis-strip{flex-wrap:wrap;gap:10px;}
}
</style>
</head>
<body>

<header>
  <div>
    <h1>📋 Daily & Weekly Report Cards</h1>
    <div class="header-meta">Team Work Report · June 2026 · 6 Members</div>
  </div>

    <div class="live-clock" id="clock">--:--:--</div>

<div class="container">

  <!-- Toggle -->
  <div class="toggle-row">
    <button class="toggle-btn active" onclick="switchView('daily',this)">📅 Daily View</button>
    <button class="toggle-btn" onclick="switchView('weekly',this)">📆 Weekly View</button>

  <div class="strip">
    <div class="strip-card"><div class="strip-lbl">Total Minutes</div><div class="strip-val">12,505</div><div class="strip-sub">≈ 208.4 hours</div></div>
    <div class="strip-card o"><div class="strip-lbl">VINs Reviewed</div><div class="strip-val">215K</div><div class="strip-sub">All rooftops</div></div>

    <div class="strip-card r"><div class="strip-lbl">Active Members</div><div class="strip-val">6</div><div class="strip-sub">Jun 15–24</div></div>

  <!-- ════════ DAILY VIEW ════════ -->
  <div class="view active" id="view-daily">
    <div class="day-cards" id="dayCardsContainer"></div>

  <!-- ════════ WEEKLY VIEW ════════ -->
  <div class="view" id="view-weekly">
    <div class="week-cards" id="weekCardsContainer"></div>
  </div>

</div>

<script>
// ── DATA ──

   members:[

    {name:'Karmendra Singh',mins:191, vins:249,  impacted:1119, tasks:1},

    {name:'Khushi',         mins:106, vins:1070, impacted:529,  tasks:4},
    {name:'Vijay',          mins:13,  vins:479,  impacted:0,    tasks:8},
  ]},
  {date:'24-Jun-26',dayNum:'24',mon:'Jun',dow:'Wed',minutes:1353,vins:26114,impacted:4989,tasks:26,
   members:[
    {name:'Khushi',         mins:481, vins:6932, impacted:2194, tasks:5},
    {name:'Shweta Gupta',   mins:415, vins:9279, impacted:1491, tasks:5},
    {name:'Vijay',          mins:276, vins:6814, impacted:527,  tasks:7},
    {name:'Tannu Kumari',   mins:143, vins:2125, impacted:643,  tasks:6},
    {name:'Karmendra Singh',mins:36,  vins:899,  impacted:128,  tasks:2},
    {name:'Sumit Rana',     mins:2,   vins:65,   impacted:6,    tasks:1},
  ]},
];

// Group into weeks
const WEEKS = [
  {label:'Week 1',range:'Jun 15–20, 2026',color:'#1a237e',days:DAILY_DATA.slice(0,6)},
  {label:'Week 2',range:'Jun 22–24, 2026',color:'#00796b',days:DAILY_DATA.slice(6)},
];

function getMemberColor(name){
  return MEMBERS.find(m=>m.name===name)?.color||'#999';
}

// ── Clock ──
function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-IN',{hour12:false});
  document.getElementById('livedate').textContent = now.toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
updateClock(); setInterval(updateClock,1000);

// ── View switch ──
function switchView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── DAILY CARDS ──
const dayContainer = document.getElementById('dayCardsContainer');
const headerBg = ['#3949ab','#1565c0','#283593','#0277bd','#00695c','#1b5e20','#4a148c','#880e4f','#bf360c'];

DAILY_DATA.forEach((day, di) => {
  const maxMins = Math.max(...day.members.map(m=>m.mins));
  const topMember = day.members[0];
  const card = document.createElement('div');
  card.className = 'day-card';
  card.innerHTML = `
    <div class="day-header" style="background:linear-gradient(135deg,${headerBg[di]}dd,${headerBg[di]}99)" onclick="toggleDay(this)">
      <div class="day-date-block">
        <div class="day-date-num" style="background:rgba(255,255,255,.2)">
          <span class="dn">${day.dayNum}</span>
          <span class="dm">${day.mon} '26</span>
        </div>
        <div>
          <div class="day-title" style="color:#fff">${day.dow}, ${day.date}</div>
          <div class="day-subtitle" style="color:rgba(255,255,255,.75)">${day.members.length} members active · Top: ${topMember.name} (${topMember.mins}m)</div>
        </div>
      </div>
      <div class="day-kpis">
        <div class="dkpi"><div class="dkpi-val" style="color:#fff">${(day.minutes/60).toFixed(1)}h</div><div class="dkpi-lbl" style="color:rgba(255,255,255,.7)">Hours</div></div>
        <div class="dkpi"><div class="dkpi-val" style="color:#fff">${day.vins.toLocaleString()}</div><div class="dkpi-lbl" style="color:rgba(255,255,255,.7)">VINs</div></div>
        <div class="dkpi"><div class="dkpi-val" style="color:#fff">${day.impacted.toLocaleString()}</div><div class="dkpi-lbl" style="color:rgba(255,255,255,.7)">Impacted</div></div>
        <div class="dkpi"><div class="dkpi-val" style="color:#fff">${day.tasks}</div><div class="dkpi-lbl" style="color:rgba(255,255,255,.7)">Tasks</div></div>
        <div class="day-chevron" style="color:rgba(255,255,255,.8)">▼</div>
      </div>
    </div>
    <div class="day-body">
      <div class="day-body-grid">
        <div>
          <div class="day-chart-title" style="margin-top:4px;margin-bottom:10px">Member Breakdown</div>
          <div class="member-rows">
            ${day.members.map(m=>`
              <div class="member-row">
                <div class="member-dot" style="background:${getMemberColor(m.name)}"></div>
                <div class="member-name">${m.name}</div>
                <div class="member-bar-wrap">
                  <div class="member-bar-bg">
                    <div class="member-bar-fill" style="width:${(m.mins/maxMins*100).toFixed(0)}%;background:${getMemberColor(m.name)}"></div>
                  </div>
                </div>
                <div class="member-stats">
                  <span><b>${m.mins}m</b>time</span>
                  <span><b>${(m.mins/60).toFixed(1)}h</b>hrs</span>
                  <span><b>${m.vins.toLocaleString()}</b>VINs</span>
                  <span><b>${m.tasks}</b>tasks</span>
                </div>
              </div>`).join('')}
          </div>
        </div>
        <div class="day-chart-wrap">
          <div class="day-chart-title">Time Share (mins)</div>
          <canvas class="day-chart" id="dc-${di}"></canvas>
        </div>

  dayContainer.appendChild(card);

  // Mini doughnut chart
  setTimeout(()=>{

      type:'doughnut',
      data:{
        labels:day.members.map(m=>m.name),

function toggleDay(header){
  const card = header.parentElement;
  card.classList.toggle('open');

// Auto-open first card
dayContainer.querySelector('.day-card').classList.add('open');

// ── WEEKLY CARDS ──
const weekContainer = document.getElementById('weekCardsContainer');

WEEKS.forEach((week, wi) => {
  const totalMins = week.days.reduce((s,d)=>s+d.minutes,0);
  const totalVins = week.days.reduce((s,d)=>s+d.vins,0);
  const totalImpacted = week.days.reduce((s,d)=>s+d.impacted,0);
  const totalTasks = week.days.reduce((s,d)=>s+d.tasks,0);

  // Aggregate members for the week
  const memberTotals = {};
  week.days.forEach(day=>{
    day.members.forEach(m=>{
      if(!memberTotals[m.name]) memberTotals[m.name]={mins:0,vins:0,impacted:0,tasks:0};
      memberTotals[m.name].mins+=m.mins;
      memberTotals[m.name].vins+=m.vins;
      memberTotals[m.name].impacted+=m.impacted;
      memberTotals[m.name].tasks+=m.tasks;
    });
  });
  const members = Object.entries(memberTotals).sort((a,b)=>b[1].mins-a[1].mins);

  const card = document.createElement('div');
  card.className = 'week-card';
  card.innerHTML = `
    <div class="week-header" style="background:linear-gradient(135deg,${week.color},${week.color}cc)">
      <div>
        <div class="week-title">📆 ${week.label}</div>
        <div class="week-range">${week.range} · ${week.days.length} working days</div>

        <div class="wkpi"><div class="wkpi-val">${totalVins.toLocaleString()}</div><div class="wkpi-lbl">VINs</div></div>
        <div class="wkpi"><div class="wkpi-val">${totalImpacted.toLocaleString()}</div><div class="wkpi-lbl">Impacted</div></div>
        <div class="wkpi"><div class="wkpi-val">${totalTasks}</div><div class="wkpi-lbl">Tasks</div></div>
      </div>
    </div>
    <div class="week-body">
      <div class="week-body-grid">
        <div>
          <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:10px;letter-spacing:.5px">Daily Minutes — ${week.label}</div>
          <canvas class="week-chart" id="wc-bar-${wi}"></canvas>
        </div>
        <div>
          <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:10px;letter-spacing:.5px">Member Share</div>
          <canvas class="week-chart" id="wc-pie-${wi}"></canvas>
        </div>
      </div>
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:10px;letter-spacing:.5px">Member Performance</div>
      <div class="week-member-grid">
        ${members.map(([name,d])=>`
          <div class="wm-card" style="background:${getMemberColor(name)}15;border:1.5px solid ${getMemberColor(name)}44">
            <div class="wm-name" style="color:${getMemberColor(name)}">${name}</div>
            <div class="wm-stats">
              <div class="wm-stat"><b>${d.mins.toFixed(0)}m</b>Minutes</div>
              <div class="wm-stat"><b>${(d.mins/60).toFixed(1)}h</b>Hours</div>
              <div class="wm-stat"><b>${d.vins.toLocaleString()}</b>VINs</div>
              <div class="wm-stat"><b>${d.tasks}</b>Tasks</div>
            </div>
          </div>`).join('')}
      </div>
      <!-- Daily timeline -->
      <div style="margin-top:18px">
        <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;color:#666;margin-bottom:10px;letter-spacing:.5px">📍 Day-by-Day Timeline</div>
        <div class="timeline">
          ${week.days.map(d=>`
            <div class="tl-item">
              <div class="tl-dot" style="background:${week.color}"></div>
              <div class="tl-time">${d.dow}, ${d.date}</div>
              <div class="tl-text">${(d.minutes/60).toFixed(1)}h worked &nbsp;·&nbsp; ${d.vins.toLocaleString()} VINs &nbsp;·&nbsp; ${d.impacted.toLocaleString()} impacted &nbsp;·&nbsp; ${d.tasks} tasks &nbsp;·&nbsp; <strong>${d.members.length} members</strong></div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  weekContainer.appendChild(card);

  setTimeout(()=>{
    // Bar chart
    new Chart(document.getElementById('wc-bar-'+wi),{
      type:'bar',
      data:{
        labels:week.days.map(d=>d.dow+' '+d.dayNum),
        datasets:[{
          label:'Minutes',
          data:week.days.map(d=>d.minutes),
          backgroundColor:week.color+'cc',
          borderRadius:6
        }]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'#f0f0f0'}}}}
    });
    // Pie
    new Chart(document.getElementById('wc-pie-'+wi),{
      type:'doughnut',
      data:{
        labels:members.map(([n])=>n),
        datasets:[{data:members.map(([,d])=>d.mins),backgroundColor:members.map(([n])=>getMemberColor(n)),borderWidth:2,borderColor:'#fff'}]
      },
      options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10}}},cutout:'55%'}
    });
  },50);
});
</script>
</body>
</html>
